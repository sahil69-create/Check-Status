        <h3>Check Account Premium and Order Status</h3>
        <p>To check whether the user is premium:</p>

        <div class="button-row">
            <button onclick="pasteFromClipboard()">Paste</button>

        <p>To see the order detail (only works for order after Feb.7 2025)</p>

    <script>
                async function postData(url = '', data = {}) {
            console.log(JSON.stringify(data));
            const response = await fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: {},
                redirect: 'follow',
                referrerPolicy: 'no-referrer',
            });
            return response.json();
        }

        function checkPremium() {
            let username = document.getElementById("account_username").value.trim();
            if (username === "") {
                alert("Please enter a valid email address.");
                return;
            }

            $.ajax({
                type: 'GET',
                url: 'http://api.gmp.jyyxt.online/api/v3/users/is_premium/' + username,
                headers: {
                    'Access-Control-Allow-Origin': '*',
                },
                success: function(responseData, textStatus, jqXHR) {
                    if (responseData["data"]["premium"]) {
                        alert("The user is premium!! O usuário é premium!!");
                    } else {
                        alert("Not premium:( Não é premium :(");
                    }
                },
                error: function(jqXHR, textStatus, errorThrown) {
                    alert("Failed to check user premium " + textStatus);
                }
            });
        }

        function checkOrder(orderNum) {
            orderNum = document.getElementById("order_id").value.trim();
            if (!orderNum.startsWith("GPA")) {
                alert("Please enter a valid order id. It should start with GPA.");
                return;
            }

            $.ajax({
                type: 'GET',
                url: 'http://api.gmp.jyyxt.online/api/v3/orders/' + orderNum,
                headers: {
                    'Access-Control-Allow-Origin': '*',
                },
                success: function(responseData, textStatus, jqXHR) {
                    try {
                        navigator.clipboard.writeText(responseData["userEmail"]);
                    } catch (e) {
                    }
                    alert("The order contains " + responseData["daysContain"] + " days premium subscription.\nThe order is credit to account: " + responseData["userEmail"] + ".\nThe account current expire time: " + responseData["userSubscriptionExpireTime"] + ".\nPurchase date is: " + responseData["purchaseDate"] + "\n\nThe user's email is automatically copied to your clipboard for you to paste conveniently");
                    document.getElementById("user_email_text").textContent = "User email to paste manually: \n" + responseData["userEmail"];
                },
                error: function(jqXHR, textStatus, errorThrown) {
                    if (jqXHR.status == 400)
                    {
                        alert("Order not found. This order doesn't exist or is made before Feb.7 2025");
                    }
                    else
                    {
                        alert("Failed to check user premium " + jqXHR.status);
                    }
                }
            });
        }

        // PASTE button functionality
        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText(); // Read from clipboard
                document.getElementById("account_username").value = text; // Paste into input field
            } catch (error) {
                alert("Failed to read from clipboard. Please allow clipboard permissions.");
            }
        }
        async function pasteOrderFromClipboard() {
            try {
                const text = await navigator.clipboard.readText(); // Read from clipboard
                document.getElementById("order_id").value = text; // Paste into input field
            } catch (error) {
                alert("Failed to read from clipboard. Please allow clipboard permissions.");
            }
        }
        // CLEAR button functionality
        function clearInput() {
            document.getElementById("account_username").value = ""; // Clear the input field
        }
